<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">
      <h2>AI Assistant</h2>
      <button id="btn-clear" title="Clear chat">Clear</button>
    </div>

    <div id="messages"></div>

    <div id="skill-picker" class="hidden">
      <ul id="skill-list"></ul>
    </div>

    <div id="input-area">
      <textarea
        id="message-input"
        placeholder="Ask anything or type / for commands..."
        rows="1"
      ></textarea>
      <button id="btn-send" title="Send message">Send</button>
    </div>
  </div>

  <script type="module" src="chat-ui.js"></script>
</body>
</html>

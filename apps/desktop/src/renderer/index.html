<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self'" />
  <title>PM-OS</title>
  <link rel="stylesheet" href="xterm.css" />
  <link rel="stylesheet" href="codicon.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="titlebar">
      <div id="titlebar-drag"></div>
      <div id="titlebar-title">PMOS</div>
    </header>
    <div id="activity-bar"></div>
    <aside id="sidebar" class="hidden">
      <div id="sidebar-content"></div>
      <div id="sidebar-resize-handle"></div>
    </aside>
    <div id="main-area">
      <main id="panel-area">
        <nav id="tab-bar"></nav>
        <div id="panel-container"></div>
      </main>
      <div id="bottom-panel" class="hidden">
        <div id="bottom-panel-resize-handle"></div>
        <div id="bottom-panel-header">
          <span id="bottom-panel-title">Terminal</span>
          <div id="bottom-panel-tabs"></div>
          <div id="bottom-panel-actions">
            <button id="bp-new-terminal" title="New Terminal"><span class="codicon codicon-plus"></span></button>
            <button id="bp-shell-dropdown" title="Launch Shell..."><span class="codicon codicon-chevron-down"></span></button>
            <button id="bp-context-menu" title="More Actions..."><span class="codicon codicon-ellipsis"></span></button>
            <button id="bp-maximize" title="Maximize Panel"><span class="codicon codicon-chevron-up"></span></button>
            <div class="bp-actions-separator"></div>
            <button id="bp-close" title="Close Panel"><span class="codicon codicon-close"></span></button>
          </div>
        </div>
        <div id="bottom-panel-body">
          <div id="bottom-panel-content"></div>
          <div id="bottom-panel-instances"></div>
        </div>
      </div>
    </div>
    <footer id="status-bar"></footer>
  </div>
  <div id="command-palette" class="hidden"></div>
  <script src="index.js"></script>
</body>
</html>
